- name: Configure Debian Systems
  hosts: debian_servers
  become: true

  roles:
    - repositories
    - base_packages
    - hostname
    - timezone
    - ssh
    - networkmanager
    - monitoring_tools
    - admin_tools
    - admin_user
    - cockpit
    - snap
    - vm_guest_tools
    - { role: gui_workstation, when: install_gui }
