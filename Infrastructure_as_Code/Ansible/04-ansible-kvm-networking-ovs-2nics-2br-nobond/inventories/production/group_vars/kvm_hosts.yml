---
# br0 - management
br0_name: br0
#br0_interface1: enp1s0
br0_interface1: ens224
br0_mtu: 1500
br0_ip: "{{ ansible_host }}"
br0_prefix: 24
br0_gw: 192.168.178.1
br0_dns:
  - 8.8.8.8
  - 1.1.1.1


# br1 - storage
br1_name: br1
#br1_interface1: enp8s0
br1_interface1: ens256
br1_ip: 192.168.100.1
br1_prefix: 24
#br1_mtu: 9000
br1_mtu: 1500


ovs_vlans:

  - name: vlan151
    id: 151
    subnet: 172.28.151

  - name: vlan152
    id: 152
    subnet: 172.28.152

  - name: vlan153
    id: 153
    subnet: 172.28.153

  - name: vlan154
    id: 154
    subnet: 172.28.154
